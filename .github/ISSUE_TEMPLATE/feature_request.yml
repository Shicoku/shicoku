name: ✨ Feature Request
description: 新しい機能や改善点を提案するためのテンプレート
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 提案する機能の簡単な説明を記入してください
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 動機
      description: この機能が必要だと思う理由を説明してください
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 提案内容
      description: 具体的にどのような機能を追加したいかを記入してください
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: もし代替手段があれば記入してください
